# ─── Spark Master ───────────────────────────────
spark.master                          spark://spark-master:7077

# ─── Iceberg Integration ────────────────────────
spark.sql.extensions                  org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse           org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type      hive
spark.sql.catalog.lakehouse.uri       thrift://hive-metastore:9083
spark.sql.catalog.lakehouse.warehouse s3a://warehouse/
spark.sql.defaultCatalog              lakehouse

# ─── Iceberg REST Catalog (alternatif) ─────────
spark.sql.catalog.iceberg_rest        org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg_rest.type   rest
spark.sql.catalog.iceberg_rest.uri    http://iceberg-rest:8181
spark.sql.catalog.iceberg_rest.warehouse s3://warehouse/
spark.sql.catalog.iceberg_rest.io-impl org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.iceberg_rest.s3.endpoint http://minio:9000
spark.sql.catalog.iceberg_rest.s3.path-style-access true

# ─── Hive Support ───────────────────────────────
spark.sql.catalogImplementation       hive
spark.hadoop.hive.metastore.uris      thrift://hive-metastore:9083

# ─── S3A / MinIO ────────────────────────────────
spark.hadoop.fs.s3a.endpoint          http://minio:9000
spark.hadoop.fs.s3a.access.key        minioadmin
spark.hadoop.fs.s3a.secret.key        minioadmin123
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.impl              org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider  org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled     false

# ─── Executor Configuration ─────────────────────
spark.executor.memory                 1g
spark.executor.cores                  1
spark.driver.memory                   1g

# ─── PySpark Python (match apache/spark:*-python3-ubuntu = 3.10) ──
spark.pyspark.python                  python3
spark.pyspark.driver.python           python3
spark.executorEnv.PYSPARK_PYTHON      python3

# ─── Extra JARs ────────────────────────────────
spark.jars.packages                   org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# ─── Event Log ──────────────────────────────────
spark.eventLog.enabled                false
