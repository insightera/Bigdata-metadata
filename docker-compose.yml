# Port ke host (bila bentrok di VM, override lewat file .env atau export):
#   LHMETA_MINIO_API_PORT, LHMETA_MINIO_CONSOLE_PORT, LHMETA_POSTGRES_PORT,
#   LHMETA_SOLR_PORT, LHMETA_HBASE_MASTER_PORT, LHMETA_HIVE_METASTORE_PORT,
#   LHMETA_ATLAS_PORT, LHMETA_SPARK_MASTER_UI_PORT, LHMETA_SPARK_MASTER_PORT,
#   LHMETA_AIRFLOW_WEB_PORT, LHMETA_ICEBERG_REST_PORT, LHMETA_JUPYTER_PORT
# Default di bawah memakai rentang 15xxx–22xxx agar tidak tabrakan dengan MinIO 9000/9001, 5432, 8080, 8081.

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  hive-warehouse:
  atlas-data:
  zookeeper-data:
  kafka-data:
  solr-data:
  catalog-node-modules:

# Airflow: `AIRFLOW__WEBSERVER__SECRET_KEY` harus identik di webserver, scheduler, dan init.
# Tanpa ini, UI memunculkan peringatan secret_key dan log task dari scheduler (port 8793) gagal (403).
x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres:5432/airflow_db
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
  AIRFLOW__WEBSERVER__SECRET_KEY: "lakehouse_secret_key_2024"
  PYTHONPATH: "/opt/airflow/scripts"

services:

  # ─────────────────────────────────────────────
  # ZOOKEEPER (required by Atlas & Kafka)
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lhmeta-zookeeper
    hostname: zookeeper
    networks: [lakehouse-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # KAFKA (required by Atlas)
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lhmeta-kafka
    hostname: kafka
    networks: [lakehouse-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Satu broker: wajib set replication / min ISR agar tidak exit(1) saat bootstrap
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      # Bila ZooKeeper di-reset tapi volume ini lama: InconsistentClusterIdException →
      # hapus volume `kafka-data` (lihat README §8.9).
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────
  # SOLR (indeks Atlas — discovery / pencarian katalog)
  # UI Solr Admin: host default http://localhost:18984/solr/
  # ─────────────────────────────────────────────
  solr:
    image: solr:8.11.2
    container_name: lhmeta-solr
    hostname: solr
    networks: [lakehouse-net]
    environment:
      # Atlas bootstrap menulis banyak dokumen ke 3 core; 512m sering memicu error indeks di Solr 8.
      SOLR_HEAP: 1024m
      # Di banyak host Docker ulimit 1024 — matikan cek agresif Solr (dev/lab)
      SOLR_ULIMIT_CHECKS: "false"
    volumes:
      - solr-data:/var/solr
    ports:
      - "${LHMETA_SOLR_PORT:-18984}:8983"
    healthcheck:
      # Tanpa core, /solr/admin/ping sering tidak dipakai — pakai info/system (valid saat 0 core).
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null 'http://127.0.0.1:8983/solr/admin/info/system?wt=json'"]
      interval: 5s
      timeout: 8s
      retries: 30
      start_period: 60s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # ─────────────────────────────────────────────
  # SOLR — init core JanusGraph/Atlas (vertex_index, edge_index, fulltext_index)
  # Konfigurasi dari Apache Atlas 2.3.0 (solr/atlas-config)
  # ─────────────────────────────────────────────
  solr-atlas-init:
    image: solr:8.11.2
    container_name: lhmeta-solr-atlas-init
    networks: [lakehouse-net]
    user: root
    depends_on:
      solr:
        condition: service_healthy
    volumes:
      - solr-data:/var/solr
      - ./solr/atlas-config:/atlas-solr:ro
      - ./scripts/solr-atlas-init.sh:/solr-atlas-init.sh:ro
    entrypoint: ["/bin/bash", "/solr-atlas-init.sh"]
    restart: "no"

  # ─────────────────────────────────────────────
  # HBASE (penyimpanan graph JanusGraph untuk Atlas)
  # All-in-one: ZK + Master + RegionServer (image harisekhon/hbase)
  # Master UI: host default http://localhost:19010/
  # Tag 2.4 tidak ada di Docker Hub; gunakan 2.1 atau latest (lihat hub.docker.com/r/harisekhon/hbase/tags)
  # ─────────────────────────────────────────────
  hbase:
    image: harisekhon/hbase:2.1
    container_name: lhmeta-hbase
    hostname: hbase
    networks: [lakehouse-net]
    expose:
      - "2181"
      - "16000"
      - "16010"
      - "16020"
      - "16030"
    ports:
      - "${LHMETA_HBASE_MASTER_PORT:-19010}:16010"
    healthcheck:
      test: ["CMD-SHELL", "(command -v jps >/dev/null 2>&1 && jps | grep -q HMaster) || pgrep -f org.apache.hadoop.hbase.master >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 25
      start_period: 120s

  # ─────────────────────────────────────────────
  # POSTGRESQL (backend for Hive Metastore & Airflow)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lhmeta-postgres
    hostname: postgres
    networks: [lakehouse-net]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: metastore_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${LHMETA_POSTGRES_PORT:-15432}:5432"

  # ─────────────────────────────────────────────
  # MINIO (S3-compatible object storage)
  # UI: host default API http://localhost:19000 , Console http://localhost:19001
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lhmeta-minio
    hostname: minio
    networks: [lakehouse-net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "${LHMETA_MINIO_API_PORT:-19000}:9000"       # S3 API (host)
      - "${LHMETA_MINIO_CONSOLE_PORT:-19001}:9001"  # Web Console (host)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer
  # staging = landing raw dari sumber (sebelum Medallion); bronze/silver/gold = lapisan lakehouse
  minio-init:
    image: minio/mc:latest
    container_name: lhmeta-minio-init
    networks: [lakehouse-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/staging;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/warehouse;
        mc mb --ignore-existing local/airflow-logs;
        echo '✅ MinIO buckets created: staging, bronze, silver, gold, warehouse, airflow-logs';
      "

  # ─────────────────────────────────────────────
  # ICEBERG REST CATALOG
  # Menyediakan REST API standar untuk manajemen tabel Iceberg
  # Endpoint: http://localhost:18181
  # ─────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:1.5.0
    container_name: lhmeta-iceberg-rest
    hostname: iceberg-rest
    networks: [lakehouse-net]
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: admin
      CATALOG_JDBC_PASSWORD: admin123
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
    ports:
      - "${LHMETA_ICEBERG_REST_PORT:-18181}:8181"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # HIVE METASTORE
  # ─────────────────────────────────────────────
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: lhmeta-hive-metastore
    hostname: hive-metastore
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SKIP_SCHEMA_INIT: "false"
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=admin
        -Djavax.jdo.option.ConnectionPassword=admin123
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./conf/core-site.xml:/opt/hive/conf/core-site.xml
      - ./lib/postgresql-42.6.0.jar:/opt/hive/lib/postgresql-42.6.0.jar:ro
      - ./lib/hadoop-aws-3.3.4.jar:/opt/hive/lib/hadoop-aws-3.3.4.jar:ro
      - ./lib/aws-java-sdk-bundle-1.12.262.jar:/opt/hive/lib/aws-java-sdk-bundle-1.12.262.jar:ro
    ports:
      - "${LHMETA_HIVE_METASTORE_PORT:-19083}:9083"   # Thrift Metastore (host)
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # APACHE ATLAS
  # UI: host default http://localhost:22100  (admin / admin)
  # ─────────────────────────────────────────────
  atlas:
    image: sburn/apache-atlas:2.3.0
    container_name: lhmeta-atlas
    hostname: atlas
    networks: [lakehouse-net]
    depends_on:
      zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
      hbase:
        condition: service_healthy
      solr:
        condition: service_healthy
      solr-atlas-init:
        condition: service_completed_successfully
    environment:
      ATLAS_OPTS: "-server -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+CMSClassUnloadingEnabled"
    volumes:
      # sburn/apache-atlas memakai ATLAS_HOME=/apache-atlas (bukan /opt/apache-atlas)
      - atlas-data:/apache-atlas/data
      - ./atlas-conf/atlas-application.properties:/apache-atlas/conf/atlas-application.properties
      # Classpath memuat /apache-atlas/hbase/conf — hbase-site bawaan memakai localhost ZK;
      # mount ini wajib agar JanusGraph/HBase client menghubungi service `hbase` di compose.
      - ./atlas-conf/hbase-site.xml:/apache-atlas/hbase/conf/hbase-site.xml:ro
    ports:
      - "${LHMETA_ATLAS_PORT:-22100}:21000"  # UI/API: di HOST pakai port 22100 (bukan 21000)
    # Image sburn/apache-atlas tidak menyertakan curl di PATH — healthcheck memakai wget atau bash /dev/tcp.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '(command -v wget>/dev/null&&wget -qO/dev/null -T 14 --user=admin --password=admin http://127.0.0.1:21000/api/atlas/v2/types/typedefs)||(command -v curl>/dev/null&&curl -sf -u admin:admin http://127.0.0.1:21000/api/atlas/v2/types/typedefs)||exec 3<>/dev/tcp/127.0.0.1/21000'",
        ]
      interval: 30s
      timeout: 18s
      retries: 25
      start_period: 180s

  # ─────────────────────────────────────────────
  # SPARK MASTER (image resmi apache/spark — bitnami/spark:3.5.1 tidak lagi di Hub)
  # UI: host default http://localhost:18080
  # ─────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: lhmeta-spark-master
    hostname: spark-master
    networks: [lakehouse-net]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./jars:/opt/spark/extra-jars
    ports:
      - "${LHMETA_SPARK_MASTER_UI_PORT:-18080}:8080"   # Spark Master Web UI (host)
      - "${LHMETA_SPARK_MASTER_PORT:-17077}:7077"     # Spark Master (host)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # SPARK WORKERS
  # ─────────────────────────────────────────────
  spark-worker-1:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: lhmeta-spark-worker-1
    hostname: spark-worker-1
    networks: [lakehouse-net]
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - "2G"
      - spark://spark-master:7077
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./jars:/opt/spark/extra-jars

  spark-worker-2:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: lhmeta-spark-worker-2
    hostname: spark-worker-2
    networks: [lakehouse-net]
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - "2G"
      - spark://spark-master:7077
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./jars:/opt/spark/extra-jars

  # ─────────────────────────────────────────────
  # AIRFLOW (Webserver + Scheduler)
  # UI: host default http://localhost:18681  (airflow / airflow)
  # ─────────────────────────────────────────────
  airflow-init:
    build: ./airflow
    container_name: lhmeta-airflow-init
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts:ro
      - ./data/staging:/opt/airflow/data/staging:ro
    entrypoint: >
      /bin/bash -c "
        airflow db init &&
        airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email airflow@lakehouse.local;
        echo '✅ Airflow DB initialized';
      "

  airflow-webserver:
    build: ./airflow
    container_name: lhmeta-airflow-webserver
    hostname: airflow-webserver
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts:ro
      - ./data/staging:/opt/airflow/data/staging:ro
    ports:
      - "${LHMETA_AIRFLOW_WEB_PORT:-18681}:8080"   # Airflow Web UI (host)
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    build: ./airflow
    container_name: lhmeta-airflow-scheduler
    hostname: airflow-scheduler
    networks: [lakehouse-net]
    depends_on:
      airflow-webserver:
        condition: service_healthy
    command: scheduler
    environment:
      <<: *airflow-common-env
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts:ro
      - ./data/staging:/opt/airflow/data/staging:ro

  # ─────────────────────────────────────────────
  # JUPYTER NOTEBOOK (PySpark + Iceberg)
  # UI: host default http://localhost:18888  (token: lakehouse)
  # Mount: DAGs di /home/jovyan/dags, notebooks di /home/jovyan/work
  # ─────────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: lhmeta-jupyter
    hostname: jupyter
    networks: [lakehouse-net]
    depends_on:
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "lakehouse"
      SPARK_MASTER: spark://spark-master:7077
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
      PYSPARK_SUBMIT_ARGS: >-
        --packages
        org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
        pyspark-shell
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./scripts/dags:/home/jovyan/dags
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
      - ./conf/core-site.xml:/usr/local/spark/conf/core-site.xml:ro
    ports:
      - "${LHMETA_JUPYTER_PORT:-18888}:8888"

  # ── Data Catalog Portal (Next.js) ──
  # Dev: default `yarn dev` (ada WebSocket /_next/webpack-hmr — tidak cocok di balik reverse proxy produksi).
  # Prod: set LHMETA_CATALOG_PRODUCTION=1 di .env → `yarn build` + `next start` (tanpa HMR).
  # NEXT_PUBLIC_* wajib sudah benar saat build (ubah URL Atlas → rebuild image/container).
  data-catalog:
    container_name: lhmeta-data-catalog
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && rm -f .pnp.cjs .pnp.loader.mjs && yarn install && if [ \"$$LHMETA_CATALOG_PRODUCTION\" = \"1\" ]; then export NODE_ENV=production && yarn build && exec yarn start; else exec yarn dev; fi"
    environment:
      - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
      - LHMETA_CATALOG_PRODUCTION=${LHMETA_CATALOG_PRODUCTION:-0}
      - NEXT_PUBLIC_ATLAS_URL=${LHMETA_CATALOG_ATLAS_URL:-http://atlas:21000}
      - ATLAS_USER=admin
      - ATLAS_PASS=admin
    volumes:
      - ./data-catalog-main:/app
      - catalog-node-modules:/app/node_modules
    ports:
      - "${LHMETA_CATALOG_PORT:-13000}:3000"
    networks:
      - lakehouse-net
    restart: unless-stopped
